<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Eko4u CSV Exporter</title>
  <style>
    body { font-family: sans-serif; width: 480px; padding: 12px; margin: 0; }
    h2   { font-size: 14px; margin-bottom: 6px; }

    /* ── Price confirmation banner ── */
    #priceBanner {
      display: none;
      background: #fff8e1;
      border: 2px solid #FFC107;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    #priceBanner .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    #priceBanner .price { font-size: 26px; font-weight: bold; color: #e65100; margin: 2px 0 4px; }
    #priceBanner .sell  { font-size: 13px; color: #555; }
    #priceBanner .uw    { font-size: 12px; color: #777; margin-top: 2px; }
    #priceBanner .hint  { font-size: 11px; color: #9e9e9e; margin-top: 6px; font-style: italic; }

    #status  { font-size: 11px; color: #555; margin-bottom: 8px; }

    /* ── Tabs ── */
    .tabs    { display: flex; gap: 4px; margin-bottom: 6px; }
    .tab     { padding: 6px 12px; cursor: pointer; font-size: 12px; border: 1px solid #ccc;
               border-bottom: none; border-radius: 4px 4px 0 0; background: #f0f0f0; }
    .tab.active { background: #fff; font-weight: bold; border-color: #2196F3; }
    .tab-panel  { display: none; }
    .tab-panel.active { display: block; }

    textarea { width: 100%; height: 180px; font-family: monospace; font-size: 11px;
               resize: vertical; box-sizing: border-box; }
    .btns    { margin-top: 8px; display: flex; gap: 6px; }
    button   { padding: 6px 12px; cursor: pointer; font-size: 12px; border-radius: 4px; }
    #copyBtn     { background: #4CAF50; color: #fff; border: none; }
    #downloadBtn { background: #2196F3; color: #fff; border: none; }
    #refreshBtn  { background: #f0f0f0; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>Eko4u Workshop POST → CSV</h2>

  <!-- Price confirmation sits at the very top -->
  <div id="priceBanner">
    <div class="label">Latest Price (confirm with UI)</div>
    <div class="price" id="priceVal">—</div>
    <div class="sell"  id="sellVal"></div>
    <div class="uw"    id="uwVal"></div>
    <div class="hint">✔ Check this matches the price shown in the configurator before using the CSV.</div>
  </div>

  <div id="status">Waiting for a POST to configurator.workshop…</div>

  <div class="tabs">
    <div class="tab active" data-tab="payload">Payload</div>
    <div class="tab" data-tab="headers">Headers</div>
  </div>

  <div class="tab-panel active" id="panel-payload">
    <textarea id="payloadOutput" placeholder="Price + payload CSV will appear here once a request is captured." readonly></textarea>
  </div>
  <div class="tab-panel" id="panel-headers">
    <textarea id="headersOutput" placeholder="Request headers CSV will appear here once a request is captured." readonly></textarea>
  </div>

  <div class="btns">
    <button id="refreshBtn">🔄 Refresh</button>
    <button id="copyBtn">📋 Copy CSV</button>
    <button id="downloadBtn">⬇ Download CSV</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
